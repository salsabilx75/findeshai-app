          "@type": "Question",
          "name": "Where should I invest money in Bangladesh in 2026?",
          "acceptedAnswer": { "@type": "Answer", "text": "The safest high-return option in Bangladesh is Sanchayapatra (national savings certificates) paying around 11.8–11.98% as of 2026, followed by bank FDRs (9–11.5%) at strong banks, treasury bonds (~10%), mutual funds, DSE blue-chip shares and gold. FinDesh AI builds a free personalised allocation based on your amount and risk comfort." }
        },
        {
          "@type": "Question",
          "name": "What is the current Sanchayapatra interest rate?",
          "acceptedAnswer": { "@type": "Answer", "text": "As of January 2026, the 5-year Bangladesh Sanchayapatra pays 11.83% (up to ৳7.5 lakh), Paribar Sanchayapatra pays 11.93%, Pensioner Sanchayapatra pays 11.98% and the 3-month profit-based certificate pays 11.82%. Use FinDesh AI's Sanchayapatra calculator to see your projected profit." }
        },
        {
          "@type": "Question",
          "name": "How do I calculate FDR profit in Bangladesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "FDR profit = principal × rate × tenure (with compounding per bank rules), minus 10–15% source tax. In 2026 strong Bangladeshi banks pay roughly 9–11.5% on 1-year FDRs. FinDesh AI's FDR calculator shows your one-year estimate instantly." }
        },
        {
          "@type": "Question",
          "name": "Which bank gives the highest DPS rate in Bangladesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "In 2026, stable banks offer DPS rates up to about 11% — for example ONE Bank's long-term schemes, Midland Bank's digital DPS (up to ~10.5%) and EBL DPS (~9.5–10.5%). bKash DPS (9–10%) with partner banks is the easiest to open. FinDesh AI's DPS calculator compares maturity values across all of them." }
        },
        {
          "@type": "Question",
          "name": "How is loan EMI calculated in Bangladesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "EMI = P × r × (1+r)^n ÷ ((1+r)^n − 1), where P is the loan amount, r the monthly interest rate and n the number of months. Personal loans in Bangladesh run about 12–15% and home loans 10–13% in 2026. FinDesh AI's EMI calculator shows your monthly payment, total interest and a year-by-year breakdown for free." }
        },
        {
          "@type": "Question",
          "name": "How much emergency fund do I need in Bangladesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "Keep 3–6 months of expenses (12 for the gold standard) in a separate liquid account — a high-rate savings account or 3-month auto-renewing FDR — before investing. FinDesh AI's Blueprint tab calculates your exact target from your monthly expenses." }
        },
        {
          "@type": "Question",
          "name": "Is it a good time to invest in the Dhaka Stock Exchange (DSE)?",
          "acceptedAnswer": { "@type": "Answer", "text": "The DSEX index is around 5,480 in June 2026, up roughly 14.8% over 12 months, and individual investors pay no capital-gains tax. But shares should come after you've used Sanchayapatra and FDRs, and only with money you can invest for years. FinDesh AI explains the right order." }
        },
        {
          "@type": "Question",
          "name": "বাংলাদেশে কোথায় বিনিয়োগ করা সবচেয়ে লাভজনক?",
          "acceptedAnswer": { "@type": "Answer", "text": "২০২৬ সালে সবচেয়ে নিরাপদ ও লাভজনক বিনিয়োগ হলো সঞ্চয়পত্র (১১.৮–১১.৯৮%), এরপর ভালো ব্যাংকের এফডিআর (৯–১১.৫%), ট্রেজারি বন্ড, মিউচুয়াল ফান্ড ও ব্লু-চিপ শেয়ার। FinDesh AI আপনার টাকা ও ঝুঁকি অনুযায়ী বিনামূল্যে একটি পরিকল্পনা তৈরি করে দেয়।" }
        },
        {
          "@type": "Question",
          "name": "সঞ্চয়পত্রের মুনাফা কীভাবে হিসাব করব?",
          "acceptedAnswer": { "@type": "Answer", "text": "সঞ্চয়পত্রের মুনাফা = বিনিয়োগের পরিমাণ × বার্ষিক হার (২০২৬ সালে ১১.৮২%–১১.৯৮%), যেখান থেকে ৫–১০% উৎসে কর কাটা হয়। FinDesh AI-এর ক্যালকুলেটরে টাকার পরিমাণ দিলেই আনুমানিক মুনাফা দেখা যায়।" }

        }
